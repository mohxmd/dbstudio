name: Release Binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: bun-linux-x64
            output: dbstudio-linux-x64
          - target: bun-darwin-x64
            output: dbstudio-macos-x64
          - target: bun-darwin-arm64
            output: dbstudio-macos-arm64
          - target: bun-windows-x64
            output: dbstudio-windows-x64.exe

    steps:
      - name: Git Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build Binary
        run: |
          mkdir -p bin
          bun build --compile --target=${{ matrix.target }} --outfile bin/${{ matrix.output }} main.ts

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: bin/${{ matrix.output }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Git Checkout
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*
            install.sh
          draft: false
          prerelease: false
          generate_release_notes: true

  publish:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Git Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Build for npm
        run: bun run build

      - name: Publish to npm
        run: npm publish --provenance --access public
